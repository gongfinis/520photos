<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>本地拍立得爱心相册</title>
  <style>
    :root {
      --bg: #0b0b10;
      --text: #f2f2f5;
      --muted: #a2a2b3;
      --card-w: 92px;
      --card-h: 114px;
      --photo-w: 78px;
      --photo-h: 78px;
    }

    * { box-sizing: border-box; user-select: none; }

    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: radial-gradient(circle at 50% 20%, #171724 0%, var(--bg) 45%, #040406 100%);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    }

    #app {
      width: 100%;
      height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: linear-gradient(180deg, rgba(30, 30, 44, 0.92), rgba(18, 18, 28, 0.92));
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(8px);
      position: relative;
      z-index: 20;
    }

    .btn, .pill {
      appearance: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      background: rgba(255, 255, 255, 0.08);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      font-size: 14px;
      line-height: 1;
    }

    .btn { cursor: pointer; transition: all 0.2s ease; }
    .btn:hover {
      border-color: rgba(215, 124, 255, 0.8);
      box-shadow: 0 0 0 2px rgba(215, 124, 255, 0.18);
      transform: translateY(-1px);
    }

    .pill { font-size: 13px; color: #ddd; }
    .tips { color: var(--muted); font-size: 12px; line-height: 1.35; white-space: nowrap; }
    .spacer { flex: 1; }

    #viewport {
      position: relative;
      overflow: hidden;
      touch-action: none;
      background:
        radial-gradient(circle at 50% 70%, rgba(168, 78, 255, 0.12), transparent 35%),
        radial-gradient(circle at 50% 86%, rgba(255, 186, 255, 0.08), transparent 42%);
    }

    #stage {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      transform-origin: 0 0;
      will-change: transform;
    }

    .card {
      position: absolute;
      width: var(--card-w);
      height: var(--card-h);
      background: #fff;
      border-radius: 3px;
      padding: 7px;
      padding-bottom: 22px;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.45), 0 2px 5px rgba(0, 0, 0, 0.25);
      transform-origin: center center;
      cursor: grab;
      will-change: transform;
    }

    .card:active { cursor: grabbing; }
    .card img {
      display: block;
      width: var(--photo-w);
      height: var(--photo-h);
      object-fit: cover;
      border-radius: 1px;
      pointer-events: none;
      -webkit-user-drag: none;
      user-drag: none;
    }

    .card::after {
      content: "";
      position: absolute;
      left: 9px;
      right: 9px;
      bottom: 8px;
      height: 4px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.06);
    }

    .empty {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      color: rgba(255, 255, 255, 0.56);
      text-align: center;
      font-size: 16px;
      line-height: 1.8;
      letter-spacing: 0.3px;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      z-index: 2;
    }

    @media (max-width: 960px) {
      .tips { width: 100%; white-space: normal; }
    }
  </style>
</head>
<body>
  <div id="app">
    <div class="toolbar">
      <button class="btn" id="reloadBtn">刷新照片</button>
      <button class="btn" id="shuffleBtn">随机重排</button>
      <button class="btn" id="fitBtn">重置视图</button>
      <button class="btn" id="exportBtn">导出 PNG</button>
      <span class="pill" id="countText">0 张</span>
      <span class="pill">来源目录：photos/</span>
      <span class="spacer"></span>
      <div class="tips">打开网页自动加载 photos 文件夹 · 滚轮缩放 · 中键平移 · 拖拽微调</div>
    </div>

    <div id="viewport">
      <div id="stage"></div>
      <div class="empty" id="emptyState">
        当前 photos 文件夹没有图片<br />
        请把 .jpg / .png / .webp / .gif 放到项目根目录 photos/ 后点击“刷新照片”
      </div>
    </div>
  </div>

  <script>
    (function () {
      const CARD_W = 92;
      const CARD_H = 114;
      const PHOTO_W = 78;
      const PHOTO_H = 78;

      const viewport = document.getElementById("viewport");
      const stage = document.getElementById("stage");
      const emptyState = document.getElementById("emptyState");
      const countText = document.getElementById("countText");
      const reloadBtn = document.getElementById("reloadBtn");
      const shuffleBtn = document.getElementById("shuffleBtn");
      const fitBtn = document.getElementById("fitBtn");
      const exportBtn = document.getElementById("exportBtn");

      let zCounter = 100;
      let view = { scale: 1, tx: 0, ty: 0 };
      let pan = null;
      let cards = [];
      let photoFiles = [];

      function rand(min, max) { return Math.random() * (max - min) + min; }
      function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
      function heartY(t) { return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t); }

      function setViewTransform() {
        stage.style.transform = `translate(${view.tx}px, ${view.ty}px) scale(${view.scale})`;
      }

      function resetView() {
        view = { scale: 1, tx: 0, ty: 0 };
        setViewTransform();
      }

      function updateCount() {
        countText.textContent = `${photoFiles.length} 张`;
      }

      function clearCards() {
        for (const c of cards) c.el.remove();
        cards = [];
      }

      function createHeartPoints(n) {
        const w = viewport.clientWidth;
        const h = viewport.clientHeight;
        const cx = w / 2;
        const cy = h / 2 + Math.min(72, h * 0.09);
        const scale = Math.min(w, h) / 26;

        const points = [];
        for (let i = 0; i < n; i++) {
          const t = (i / n) * Math.PI * 2;
          points.push({
            x: cx + heartX(t) * scale + rand(-8, 8),
            y: cy - heartY(t) * scale + rand(-7, 7)
          });
        }

        const minGap = Math.max(35, CARD_W * (0.58 - Math.min(n / 120, 1) * 0.08));
        for (let round = 0; round < 6; round++) {
          for (let i = 0; i < points.length; i++) {
            for (let j = i + 1; j < points.length; j++) {
              const dx = points[j].x - points[i].x;
              const dy = points[j].y - points[i].y;
              const dist = Math.sqrt(dx * dx + dy * dy) || 0.001;
              if (dist < minGap) {
                const push = (minGap - dist) * 0.38;
                const ux = dx / dist;
                const uy = dy / dist;
                points[i].x -= ux * push;
                points[i].y -= uy * push;
                points[j].x += ux * push;
                points[j].y += uy * push;
              }
            }
          }
        }
        return points;
      }

      function applyCardTransform(card) {
        card.el.style.transform = `translate(${card.x}px, ${card.y}px) rotate(${card.rot}deg)`;
        card.el.style.zIndex = String(card.z);
      }

      function bindCardDrag(card) {
        let drag = null;

        card.el.addEventListener("pointerdown", (e) => {
          if (e.button !== 0) return;
          e.preventDefault();
          e.stopPropagation();
          card.el.setPointerCapture(e.pointerId);
          card.z = ++zCounter;
          applyCardTransform(card);

          drag = {
            pointerId: e.pointerId,
            startX: e.clientX,
            startY: e.clientY,
            originX: card.x,
            originY: card.y
          };
        });

        card.el.addEventListener("pointermove", (e) => {
          if (!drag || drag.pointerId !== e.pointerId) return;
          const dx = (e.clientX - drag.startX) / view.scale;
          const dy = (e.clientY - drag.startY) / view.scale;
          card.x = drag.originX + dx;
          card.y = drag.originY + dy;
          applyCardTransform(card);
        });

        function endDrag(e) {
          if (!drag || drag.pointerId !== e.pointerId) return;
          drag = null;
          card.el.releasePointerCapture(e.pointerId);
        }

        card.el.addEventListener("pointerup", endDrag);
        card.el.addEventListener("pointercancel", endDrag);
      }

      function buildCards() {
        clearCards();

        if (!photoFiles.length) {
          emptyState.style.display = "grid";
          return;
        }

        emptyState.style.display = "none";
        const points = createHeartPoints(photoFiles.length);

        photoFiles.forEach((file, i) => {
          const p = points[i % points.length];

          const cardEl = document.createElement("div");
          cardEl.className = "card";
          const imgEl = document.createElement("img");
          imgEl.src = file.url;
          cardEl.appendChild(imgEl);
          stage.appendChild(cardEl);

          const card = {
            id: file.name,
            el: cardEl,
            imgEl,
            x: p.x - CARD_W / 2,
            y: p.y - CARD_H / 2,
            rot: rand(-15, 15),
            z: i + 1
          };

          applyCardTransform(card);
          bindCardDrag(card);
          cards.push(card);
        });

        zCounter = cards.length + 100;
      }

      async function loadPhotos() {
        try {
          let data;
          try {
            const res = await fetch("/api/photos", { cache: "no-store" });
            if (!res.ok) throw new Error("API not available");
            data = await res.json();
          } catch (apiErr) {
            console.log("📦 使用静态 JSON 模式 (Netlify)");
            const jsonRes = await fetch("/photos.json", { cache: "no-store" });
            if (!jsonRes.ok) throw new Error("无法加载照片列表");
            data = await jsonRes.json();
          }

          photoFiles = Array.isArray(data.files) ? data.files : [];
          updateCount();
          buildCards();
        } catch (err) {
          console.error(err);
          alert("读取照片失败：\n• 本地模式请确认服务已启动\n• Netlify模式请先运行 npm run build");
        }
      }

      function randomShuffle() {
        if (!cards.length) return;
        const points = createHeartPoints(cards.length);
        for (let i = cards.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [cards[i], cards[j]] = [cards[j], cards[i]];
        }
        cards.forEach((card, i) => {
          const p = points[i];
          card.x = p.x - CARD_W / 2;
          card.y = p.y - CARD_H / 2;
          card.rot = rand(-15, 15);
          card.z = i + 1;
          applyCardTransform(card);
        });
        zCounter = cards.length + 100;
      }

      function exportPNG() {
        if (!cards.length) {
          alert("没有可导出的照片");
          return;
        }

        const w = viewport.clientWidth;
        const h = viewport.clientHeight;
        const scale = 2;

        const c = document.createElement("canvas");
        c.width = Math.round(w * scale);
        c.height = Math.round(h * scale);
        const ctx = c.getContext("2d");

        ctx.scale(scale, scale);
        const bg = ctx.createRadialGradient(w / 2, h * 0.2, 10, w / 2, h, Math.max(w, h));
        bg.addColorStop(0, "#171724");
        bg.addColorStop(0.45, "#0b0b10");
        bg.addColorStop(1, "#040406");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, w, h);

        const ordered = [...cards].sort((a, b) => a.z - b.z);

        ctx.save();
        ctx.translate(view.tx, view.ty);
        ctx.scale(view.scale, view.scale);

        for (const card of ordered) {
          const rad = (card.rot * Math.PI) / 180;
          ctx.save();
          ctx.translate(card.x + CARD_W / 2, card.y + CARD_H / 2);
          ctx.rotate(rad);
          ctx.translate(-CARD_W / 2, -CARD_H / 2);
          ctx.fillStyle = "#fff";
          ctx.shadowColor = "rgba(0,0,0,0.35)";
          ctx.shadowBlur = 14;
          ctx.shadowOffsetY = 6;
          ctx.fillRect(0, 0, CARD_W, CARD_H);
          ctx.shadowColor = "transparent";
          ctx.drawImage(card.imgEl, 7, 7, PHOTO_W, PHOTO_H);
          ctx.fillStyle = "rgba(0,0,0,0.06)";
          ctx.fillRect(9, CARD_H - 11, CARD_W - 18, 4);
          ctx.restore();
        }

        ctx.restore();

        c.toBlob((blob) => {
          if (!blob) return;
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `local-heart-${Date.now()}.png`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);
        }, "image/png");
      }

      reloadBtn.addEventListener("click", loadPhotos);
      shuffleBtn.addEventListener("click", randomShuffle);
      fitBtn.addEventListener("click", resetView);
      exportBtn.addEventListener("click", exportPNG);

      viewport.addEventListener("wheel", (e) => {
        e.preventDefault();
        const oldScale = view.scale;
        const factor = e.deltaY < 0 ? 1.1 : 1 / 1.1;
        const nextScale = Math.max(0.3, Math.min(3, oldScale * factor));
        if (nextScale === oldScale) return;

        const rect = viewport.getBoundingClientRect();
        const mx = e.clientX - rect.left;
        const my = e.clientY - rect.top;
        const worldX = (mx - view.tx) / oldScale;
        const worldY = (my - view.ty) / oldScale;

        view.scale = nextScale;
        view.tx = mx - worldX * nextScale;
        view.ty = my - worldY * nextScale;
        setViewTransform();
      }, { passive: false });

      viewport.addEventListener("pointerdown", (e) => {
        if (e.button !== 1) return;
        e.preventDefault();
        pan = {
          pointerId: e.pointerId,
          sx: e.clientX,
          sy: e.clientY,
          ox: view.tx,
          oy: view.ty
        };
        viewport.setPointerCapture(e.pointerId);
      });

      viewport.addEventListener("pointermove", (e) => {
        if (!pan || pan.pointerId !== e.pointerId) return;
        view.tx = pan.ox + (e.clientX - pan.sx);
        view.ty = pan.oy + (e.clientY - pan.sy);
        setViewTransform();
      });

      function stopPan(e) {
        if (!pan || pan.pointerId !== e.pointerId) return;
        pan = null;
        viewport.releasePointerCapture(e.pointerId);
      }

      viewport.addEventListener("pointerup", stopPan);
      viewport.addEventListener("pointercancel", stopPan);

      window.addEventListener("resize", () => {
        if (photoFiles.length) buildCards();
      });

      resetView();
      loadPhotos();
    })();
  </script>
</body>
</html>
